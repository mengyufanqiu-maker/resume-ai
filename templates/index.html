<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI | 大厂黑话简历双变量定制平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .resume-render h2 { font-size: 1.3rem; font-weight: 800; border-bottom: 2px solid #2563eb; padding-bottom: 4px; margin: 1.5rem 0 0.75rem 0; color: #1e3a8a; }
        .resume-render p, .resume-render li { font-size: 14px; line-height: 1.6; color: #334155; }
        .resume-render ul { list-style-type: square; padding-left: 1.2rem; margin-bottom: 0.75rem; }
        /* 隐藏原生的丑陋文件上传按钮 */
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; cursor: pointer; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50/20 to-indigo-50/30 min-h-screen font-sans text-slate-800">

    <header class="bg-white/80 backdrop-blur shadow-sm sticky top-0 z-10 border-b border-blue-100">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-user-tie text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">Resume <span class="text-blue-600">AI</span></h1>
            </div>
            <span class="text-xs bg-blue-600 text-white px-3 py-1 rounded-full font-bold">多模态简历定制外挂</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-xl border border-slate-100 h-fit space-y-6">
                <div>
                    <h2 class="text-lg font-black text-slate-800">简历双变量智改</h2>
                    <p class="text-xs text-slate-400 mt-0.5">支持文本粘贴或直接上传 JD 截图</p>
                </div>
                <form id="resumeForm" onsubmit="submitForm(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">1. 你的原始经历 (文本)</label>
                        <textarea id="raw_resume" rows="4" placeholder="直接粘贴你原本的旧简历..." class="w-full text-sm p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 resize-none" required></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">2. 目标岗位 JD (二选一)</label>
                        <textarea id="jd_text" rows="3" placeholder="可以直接粘贴 JD 文本..." class="w-full text-sm p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-2"></textarea>
                        
                        <label class="custom-file-upload w-full text-center border-2 border-dashed border-blue-300 bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold py-3 rounded-xl transition">
                            <input type="file" id="jd_image" accept="image/png, image/jpeg" onchange="updateFileName()"/>
                            <i class="fa-solid fa-image mr-2"></i><span id="fileNameDisplay">或者点击上传 JD 截图</span>
                        </label>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-md flex items-center justify-center space-x-2 mt-4">
                        <i id="btnIcon" class="fa-solid fa-wand-magic-sparkles"></i>
                        <span id="btnText">AI 视觉读取与重构</span>
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6 hidden" id="resultArea">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
                        <div class="flex items-center space-x-2 border-b border-slate-100 pb-3 mb-4">
                            <i class="fa-solid fa-file-invoice text-emerald-500"></i>
                            <h3 class="font-black text-slate-800">模块一：A4 纸直出重构简历</h3>
                        </div>
                        <div class="resume-render" id="resumeDisplay"></div>
                    </div>
                    <div class="bg-slate-900 text-slate-100 p-6 rounded-2xl shadow-xl">
                        <div class="flex items-center space-x-2 border-b border-slate-800 pb-3 mb-4">
                            <i class="fa-solid fa-user-secret text-amber-400"></i>
                            <h3 class="font-black text-amber-400">模块二：暗黑面试官提问预测</h3>
                        </div>
                        <div class="prose prose-invert text-sm text-slate-300 space-y-3" id="examDisplay"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 上传图片后改变按钮文字提示
        function updateFileName() {
            const input = document.getElementById('jd_image');
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files.length > 0) {
                display.innerText = "已选择: " + input.files[0].name;
            } else {
                display.innerText = "或者点击上传 JD 截图";
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            btnIcon.className = 'fa-solid fa-spinner fa-spin';
            btnText.innerText = '正在进行视觉解析与重构...';

            // 打包数据，包含文本和图片
            const formData = new FormData();
            formData.append('raw_resume', document.getElementById('raw_resume').value);
            formData.append('jd_text', document.getElementById('jd_text').value);
            
            const imageFile = document.getElementById('jd_image').files[0];
            if (imageFile) {
                formData.append('jd_image', imageFile);
            }

            try {
                const response = await fetch('/api/customize_resume', { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) {
                    const rawResult = data.result;
                    const parts = rawResult.split('---');
                    
                    document.getElementById('resumeDisplay').innerHTML = marked.parse(parts[0] || '');
                    document.getElementById('examDisplay').innerHTML = marked.parse(parts[1] || '未检测到分割标志，请尝试重新生成。');
                    
                    resultArea.classList.remove('hidden');
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                } else { alert('重构失败: ' + data.error); }
            } catch(e) { alert('请求异常: ' + e); }

            btn.disabled = false;
            btnIcon.className = 'fa-solid fa-wand-magic-sparkles';
            btnText.innerText = 'AI 视觉读取与重构';
        }
    </script>
</body>
</html>
